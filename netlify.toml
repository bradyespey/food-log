[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "vite"
  targetPort = 8888
  port = 8889

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.food-analyze]
  timeout = 26

[functions.food-log]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
