[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "vite --port 5177"
  targetPort = 5177
  port = 8888

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
